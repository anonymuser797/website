<!DOCTYPE html>
<html>
<head>
  <title>Demo Wallet</title>
</head>
<body style="font-family:sans-serif; text-align:center;">

<script>
function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  // Validasi angka & panjang
  let userValid = /^[0-9]{12}$/.test(u);
  let passValid = /^[0-9]{6}$/.test(p);

  if (userValid && passValid) {
    showPage('home');
  } else {
    document.getElementById("error").innerHTML =
      "Username harus 12 digit & PIN harus 6 digit angka!";
  }
}
</script>

  <!-- HOME -->
  <div id="home" style="display:none;">
    <h2>Home</h2>
    <h3>Saldo: Rp 1.000.000</h3>

    <button onclick="showPage('transfer')">Transfer</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- TRANSFER -->
  <div id="transfer" style="display:none;">
    <h2>Transfer</h2>
    <input placeholder="Nomor tujuan"><br><br>
    <input placeholder="Jumlah"><br><br>

    <button onclick="kirim()">Kirim</button><br><br>
    <button onclick="showPage('home')">Kembali</button>
  </div>

  <script>
    function login() {
      let u = document.getElementById("user").value;
      let p = document.getElementById("pass").value;

      if (u === "08123456789" && p === "1234") {
        showPage('home');
      } else {
        document.getElementById("error").innerHTML = "Login gagal";
      }
    }

    function showPage(page) {
      document.getElementById("login").style.display = "none";
      document.getElementById("home").style.display = "none";
      document.getElementById("transfer").style.display = "none";

      document.getElementById(page).style.display = "block";
    }

    function logout() {
      showPage('login');
    }

    function kirim() {
      alert("Transfer berhasil (ini hanya demo)");
      showPage('home');
    }
  </script>

</body>
</html>
