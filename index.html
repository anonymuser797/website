<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DANA</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f1f3f6;
}

/* HEADER */
.header {
  background:#108ee9;
  color:white;
  padding:20px;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

.saldo-card {
  background:linear-gradient(90deg,#108ee9,#36cfc9);
  padding:20px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.menu {
  display:flex;
  justify-content:space-around;
  margin-top:20px;
  text-align:center;
}

.menu div {
  background:white;
  padding:15px;
  border-radius:15px;
  width:70px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.menu div:active {
  transform:scale(0.95);
}

/* FITUR GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
  padding:15px;
}

.grid div {
  background:white;
  padding:10px;
  border-radius:15px;
  text-align:center;
  font-size:12px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* NAVBAR */
.navbar {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>Blue Wallet</h2>

  <div class="saldo-card">
    <p>Saldo</p>
    <h1 id="saldo">Rp 1.250.000</h1>
  </div>
</div>

<!-- MENU CEPAT -->
<div class="menu">
  <div onclick="kirim()">💸<br>Kirim</div>
  <div onclick="topup()">➕<br>Top Up</div>
  <div onclick="request()">📥<br>Minta</div>
  <div onclick="scan()">📷<br>Scan</div>
</div>

<!-- FITUR -->
<div class="grid">
  <div>📱 Pulsa</div>
  <div>💡 Listrik</div>
  <div>🎮 Game</div>
  <div>💳 Kartu</div>
  <div>🚗 Transport</div>
  <div>🛒 Belanja</div>
  <div>📦 Paket</div>
  <div>➕ Lainnya</div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div>🏠 Home</div>
  <div>📄 History</div>
  <div>👤 Profile</div>
</div>

<script>
let saldo = 1250000;

function updateSaldo(){
  document.getElementById("saldo").innerText =
    "Rp " + saldo.toLocaleString();
}

function kirim(){
  let j = prompt("Kirim berapa?");
  if(j){
    saldo -= parseInt(j);
    updateSaldo();
  }
}

function topup(){
  let j = prompt("Top up berapa?");
  if(j){
    saldo += parseInt(j);
    updateSaldo();
  }
}

function request(){
  alert("Fitur minta uang");
}

function scan(){
  alert("Fitur scan QR");
}
</script>

</body>
</html>
