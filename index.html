<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Wallet</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
}

/* BACKGROUND */
.hero {
  height:100vh;
  background:linear-gradient(rgba(16,142,233,0.8), rgba(54,207,201,0.8)), url('bg.jpg');
  background-size:cover;
  background-position:center;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  color:white;
  position:relative;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:20px;
  font-weight:bold;
}

.logo {
  font-size:22px;
}

/* CONTENT */
.content {
  text-align:center;
  padding:20px;
}

.badge {
  display:inline-block;
  background:white;
  color:#108ee9;
  padding:8px 15px;
  border-radius:20px;
  font-weight:bold;
  margin-bottom:15px;
}

h1 {
  font-size:20px;
}

.tagline {
  font-size:26px;
  font-weight:bold;
  margin-top:10px;
}

/* BUTTON */
.btn {
  background:white;
  color:#108ee9;
  border:none;
  padding:15px;
  border-radius:30px;
  width:80%;
  max-width:320px;
  font-size:18px;
  font-weight:bold;
  margin:20px auto;
  display:block;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* MENU */
#menu {
  position:absolute;
  top:0;
  right:-250px;
  width:220px;
  height:100%;
  background:white;
  color:black;
  padding:20px;
  transition:0.3s;
  z-index:2;
}

#menu p {
  padding:10px 0;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

/* OVERLAY */
#overlay {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:1;
}
</style>
</head>

<body>

<div class="hero">

  <!-- OVERLAY -->
  <div id="overlay" onclick="toggleMenu()"></div>

  <!-- MENU -->
  <div id="menu">
    <h3>Menu</h3>
    <p onclick="alert('Profile')">👤 Profile</p>
    <p onclick="alert('Pengaturan')">⚙️ Pengaturan</p>
    <p onclick="alert('Bantuan')">❓ Bantuan</p>
    <p onclick="alert('Logout')">🚪 Logout</p>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Blue</div>
    <div style="font-size:22px; cursor:pointer;" onclick="toggleMenu()">☰</div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="badge">🔒 Blue Protection</div>
    <h1>JAMINAN 100% UANG KEMBALI</h1>
    <div class="tagline">#AMAN DARI PENIPU</div>

    <button class="btn" onclick="masuk()">Masuk Sekarang</button>
  </div>

  <!-- FOOTER -->
  <div style="text-align:center; padding-bottom:20px; font-size:12px;">
    Blue Wallet versi demo
  </div>

</div>

<script>
let buka = false;

function toggleMenu(){
  let menu = document.getElementById("menu");
  let overlay = document.getElementById("overlay");

  if(!buka){
    menu.style.right = "0";
    overlay.style.display = "block";
    buka = true;
  } else {
    menu.style.right = "-250px";
    overlay.style.display = "none";
    buka = false;
  }
}

function masuk(){
  alert("Masuk ke aplikasi...");
}
</script>

</body>
</html>
