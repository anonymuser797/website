<!DOCTYPE html>
<html>
<head>
  <title>DANA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:sans-serif;
    }

    .center {
      text-align:center;
      color:white;
    }

    .btn {
      width:80%;
      max-width:300px;
      padding:15px;
      border:none;
      border-radius:30px;
      background:white;
      color:#108ee9;
      font-weight:bold;
      font-size:16px;
    }
  </style>
</head>

<body>

<!-- LANDING -->
<div id="landing" style="
height:100vh;
background:linear-gradient(#108ee9,#36cfc9);
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
">

  <!-- ATAS -->
  <div style="width:100%; padding:20px; color:white; display:flex; justify-content:space-between;">
    <h2>Blue</h2>
    <div>☰</div>
  </div>

  <!-- GAMBAR -->
  <div class="center">
    <img src="bg.jpg" width="80%" style="border-radius:20px;">
    
    <h2 style="margin-top:15px;">100% Aman</h2>
    <p>#AmanDariPenipu</p>
  </div>

  <!-- BUTTON -->
  <div style="margin-bottom:40px;">
    <button class="btn" onclick="showLogin()">Masuk</button>
  </div>

</div>

<!-- LOGIN -->
<div id="login" style="
display:none;
height:100vh;
background:#108ee9;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
">

  <h2>Blue Wallet</h2>

  <div style="background:white; padding:20px; border-radius:20px; color:black; width:300px;">
    
    <input id="user" placeholder="Nomor 12 digit" maxlength="12" style="width:100%; padding:10px;"><br><br>
    <input id="pass" type="password" placeholder="PIN 6 digit" maxlength="6" style="width:100%; padding:10px;"><br><br>

    <button onclick="login()" style="width:100%; padding:10px; background:#108ee9; color:white; border:none;">
      Login
    </button>

    <p id="error" style="color:red;"></p>
  </div>

</div>

<script>
function showLogin() {
  document.getElementById("landing").style.display = "none";
  document.getElementById("login").style.display = "flex";
}

function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (/^[0-9]{12}$/.test(u) && /^[0-9]{6}$/.test(p)) {
    alert("Login berhasil!");
  } else {
    document.getElementById("error").innerText = "Format salah!";
  }
}
</script>

</body>
</html>
